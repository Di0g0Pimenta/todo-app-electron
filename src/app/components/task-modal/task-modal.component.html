<div
  *ngIf="isOpen"
  class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/50 px-4 py-6 backdrop-blur-sm"
  aria-hidden="false"
  (click)="closeModal.emit()"
>
  <div class="w-full max-w-lg rounded-lg bg-white shadow-xl" (click)="$event.stopPropagation()">
    <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
      <h2 class="text-xl font-semibold text-slate-950">Criar tarefa</h2>
      <button class="grid h-9 w-9 place-items-center rounded-lg text-2xl text-slate-500 transition hover:bg-slate-100 hover:text-slate-950 focus:outline-none focus:ring-4 focus:ring-slate-200" type="button" aria-label="Fechar" (click)="closeModal.emit()">
        &times;
      </button>
    </div>

    <form class="space-y-5 px-6 py-5" (ngSubmit)="submit()">
      <label class="block">
        <span class="mb-2 block text-sm font-semibold text-slate-700">Nome</span>
        <input class="w-full rounded-lg border border-slate-300 px-4 py-3 text-sm outline-none transition focus:border-teal-700 focus:ring-4 focus:ring-teal-100" type="text" placeholder="Ex.: Estudar Electron" name="name" [(ngModel)]="name" required />
      </label>

      <label class="block">
        <span class="mb-2 block text-sm font-semibold text-slate-700">Notas</span>
        <textarea class="min-h-28 w-full resize-y rounded-lg border border-slate-300 px-4 py-3 text-sm outline-none transition focus:border-teal-700 focus:ring-4 focus:ring-teal-100" placeholder="Detalhes opcionais..." name="notes" [(ngModel)]="notes"></textarea>
      </label>

      <label class="block">
        <span class="mb-2 block text-sm font-semibold text-slate-700">Data limite</span>
        <input class="w-full rounded-lg border border-slate-300 px-4 py-3 text-sm outline-none transition focus:border-teal-700 focus:ring-4 focus:ring-teal-100" type="date" name="dueDate" [(ngModel)]="dueDate" />
      </label>

      <p *ngIf="errorMessage" class="rounded-lg bg-red-50 px-4 py-3 text-sm font-medium text-red-700">
        {{ errorMessage }}
      </p>

      <div class="flex flex-col-reverse gap-3 border-t border-slate-200 pt-5 sm:flex-row sm:justify-end">
        <button class="rounded-lg border border-slate-200 px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-100 focus:outline-none focus:ring-4 focus:ring-slate-200" type="button" (click)="closeModal.emit()">
          Cancelar
        </button>
        <button class="rounded-lg bg-teal-700 px-5 py-3 text-sm font-semibold text-white transition hover:bg-teal-800 focus:outline-none focus:ring-4 focus:ring-teal-200" type="submit">
          Guardar tarefa
        </button>
      </div>
    </form>
  </div>
</div>
