name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ToDo Calendar ${{ github.ref_name }}
          body_path: docs/release-notes/${{ github.ref_name }}.md
          prerelease: true
          files: |
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/latest.yml
